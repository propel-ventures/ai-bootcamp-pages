name: Deploy to Azure Static Web Apps
# No-op comment: keep workflow-touch commits available for deployment retriggers.

on:
  push:
    branches: [main, feature/access-control]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-azure-swa.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: azure-swa
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment token
        id: token_check
        shell: bash
        run: |
          if [ -n "${AZURE_STATIC_WEB_APPS_API_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Missing token notice
        if: steps.token_check.outputs.present != 'true'
        run: |
          echo "AZURE_STATIC_WEB_APPS_API_TOKEN is not set."
          echo "Add the secret in GitHub settings to enable Azure SWA deployment."

      - name: Build and Deploy to Azure Static Web Apps
        if: steps.token_check.outputs.present == 'true'
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9
        env:
          BASE_PATH: /
          PUBLIC_ACCESS_FORM_URL: ${{ secrets.PUBLIC_ACCESS_FORM_URL }}
          PUBLIC_ACCESS_FORM_WEBHOOK_URL: ${{ secrets.PUBLIC_ACCESS_FORM_WEBHOOK_URL }}
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: site
          output_location: dist
