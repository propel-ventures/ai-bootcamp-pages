name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-azure-swa.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: azure-swa
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9
        env:
          BASE_PATH: /
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: site
          output_location: dist

  token-missing:
    if: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Missing token notice
        run: |
          echo "AZURE_STATIC_WEB_APPS_API_TOKEN is not set."
          echo "Add the secret in GitHub settings to enable Azure SWA deployment."
